plugins {
    id 'base'
}

allprojects {
    group = 'com.flatide'
    version = '0.16.0'
    repositories {
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'java'

    // Baseline = Java 25 LTS, STABLE APIs ONLY. No --enable-preview anywhere (design §0.1):
    // StructuredTaskScope is still preview on JDK 25 (verified in the spike) and is avoided;
    // virtual threads + ScopedValue are final and used directly.
    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
    }

    dependencies {
        testImplementation platform('org.junit:junit-bom:5.11.4')
        testImplementation 'org.junit.jupiter:junit-jupiter'
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    }

    tasks.withType(Test).configureEach {
        useJUnitPlatform()
        testLogging {
            events = ['passed', 'skipped', 'failed']
            exceptionFormat = 'full'
        }
    }
}

// Assemble the self-contained runnable JAR into dist/ (like v1's dist/), so it can be run with
//   java -jar dist/propertee2-<version>.jar <script.tee>      (requires JDK 25)
tasks.register('dist', Copy) {
    group = 'build'
    description = 'Copy the runnable fat JAR into dist/'
    dependsOn ':propertee-cli:fatJar'
    from { project(':propertee-cli').tasks.named('fatJar').get().archiveFile }
    into layout.projectDirectory.dir('dist')
}
